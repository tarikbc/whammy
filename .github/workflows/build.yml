name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # required so tag builds can publish a Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages (build-tools 35, platform 34)
        run: sdkmanager "platforms;android-34" "build-tools;35.0.0"

      - name: Vendor AndroidX + Kotlin jars
        run: ./vendor-libs.sh

      - name: Unit tests
        run: ./test.sh

      - name: Decode release signing key (tags only)
        if: github.ref_type == 'tag'
        env:
          KS_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STOREPASS: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEYPASS: ${{ secrets.RELEASE_KEY_PASSWORD }}
          KEYALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: |
          if [ -n "$KS_B64" ]; then
            mkdir -p keystore
            printf '%s' "$KS_B64" | base64 -d > keystore/whammy-release.jks
            {
              echo "KEYSTORE=keystore/whammy-release.jks"
              echo "STOREPASS=$STOREPASS"
              echo "KEYPASS=$KEYPASS"
              echo "KEYALIAS=$KEYALIAS"
            } >> "$GITHUB_ENV"
            echo "Release key configured — publishing a release-signed APK."
          else
            echo "::warning::No RELEASE_KEYSTORE_BASE64 secret set; this release will be debug-signed."
          fi

      - name: Build APK
        env:
          VERSION_NAME: ${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
          VERSION_CODE: ${{ github.run_number }}
        run: ./build.sh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: whammy-apk
          path: build/whammy.apk
          if-no-files-found: error

      - name: Publish Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: build/whammy.apk
          generate_release_notes: true
          body: |
            Debug-signed APK — sideload it (enable "install unknown apps" for your file manager/browser).
            Grant all-files access on first launch so it can write into your Clone Hero Songs folder.
